<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>출석부</title>
<style>
  :root{
    --bg:#FAF9F6;
    --card:#FFFFFF;
    --ink:#2B2A27;
    --ink-soft:#7A766C;
    --ink-faint:#A8A398;
    --line:#E2DED3;
    --line-strong:#CFC9BB;
    --accent:#52624A;
    --accent-soft:#E9EEE4;
    --absent:#B5503B;
    --absent-soft:#F7E9E4;
    --late:#A2792F;
    --late-soft:#F6EEDC;
    --early:#6E5C9E;
    --early-soft:#ECE7F6;
    --off-bg:#F0EEE8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    max-width:430px;margin-left:auto;margin-right:auto;
    -webkit-font-smoothing:antialiased;
  }
  body{padding-bottom:74px;}
  .screen{display:none;}
  .screen.active{display:block;}

  /* ---- Top bar ---- */
  .topbar{
    position:sticky;top:0;z-index:20;background:var(--bg);
    padding:12px 14px 8px;border-bottom:1px solid var(--line);
  }
  .date-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .date-main{font-size:18px;font-weight:700;letter-spacing:-0.2px;}
  .nav-btn{
    border:none;background:#F2F0EA;
    width:40px;height:38px;border-radius:10px;font-size:18px;color:var(--ink);
    display:flex;align-items:center;justify-content:center;flex:none;
  }
  .nav-btn:active{background:var(--accent-soft);}
  .icon-btn{
    border:none;background:#F2F0EA;
    height:38px;padding:0 16px;border-radius:10px;font-size:14.5px;font-weight:600;color:var(--ink-soft);
    display:flex;align-items:center;gap:4px;
  }

  .summary-row{display:flex;gap:6px;margin-top:10px;align-items:stretch;}
  .sum-card{flex:1;background:#F2F0EA;border-radius:11px;padding:7px 4px;text-align:center;}
  .sum-num{font-size:18px;font-weight:700;line-height:1.1;}
  .sum-label{font-size:10.5px;color:var(--ink-soft);margin-top:1px;}

  .search-input{min-width:0;width:auto;padding:0 26px 0 12px;border:none;border-radius:11px;font-size:15px;background:#F2F0EA;color:var(--ink);text-align:center;}
  .search-input::placeholder{color:var(--ink-faint);}
  .search-box-wrap{position:relative;flex:2;display:flex;}
  .search-box-wrap .search-input{width:100%;}
  .search-clear{
    position:absolute;right:4px;top:50%;transform:translateY(-50%);
    width:22px;height:22px;border-radius:50%;border:none;background:var(--ink-faint);
    color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;
  }

  .filter-row{display:flex;gap:5px;margin-top:8px;overflow-x:auto;padding-bottom:1px;}
  .filter-chip{flex:none;padding:5px 11px;border-radius:999px;border:none;background:#F2F0EA;font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}
  .filter-chip.active{background:var(--accent);color:#fff;}

  /* ---- List ---- */
  .list{padding:8px 12px 0;}
  .row{background:var(--card);}
  .row-inner{padding:6px 12px;border-bottom:1px solid var(--line);}
  .row:last-child .row-inner{border-bottom:none;}
  .row.is-off .row-inner{background:var(--off-bg);}
  .list-card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}

  .row-top{display:flex;align-items:center;gap:8px;}
  .row-no{font-size:11.5px;color:var(--ink-soft);min-width:20px;font-weight:600;}
  .row-name{font-size:15px;font-weight:600;flex:1;}
  .tag{font-size:10.5px;padding:2px 6px;border-radius:6px;margin-left:4px;font-weight:600;}
  .tag-off{background:#E6E2D7;color:var(--ink-soft);}

  .status-btns{display:flex;gap:4px;margin-top:8px;background:#F2F0EA;border-radius:10px;padding:3px;}
  .status-btn{flex:1;padding:7px 0;border-radius:8px;border:none;background:transparent;font-size:12.5px;font-weight:600;color:var(--ink-soft);}
  .status-btn.sel-present{background:var(--accent);color:#fff;}
  .status-btn.sel-absent{background:var(--absent);color:#fff;}
  .status-btn.sel-late{background:var(--late);color:#fff;}
  .status-btn.sel-early{background:var(--early);color:#fff;}

  .meal-row{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .meal-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-soft);}
  .meal-pill{padding:4px 10px;border-radius:7px;border:none;font-size:12px;font-weight:700;background:#F2F0EA;color:var(--ink-soft);}
  .meal-pill.on{background:var(--accent-soft);color:var(--accent);}
  .meal-pill.off{background:var(--absent-soft);color:var(--absent);}

  .note-input{flex:1;min-width:90px;margin-top:0;padding:6px 9px;border:none;border-radius:8px;font-size:12px;background:#F2F0EA;color:var(--ink);}

  .off-note{font-size:12px;color:var(--ink-faint);}
  .unchecked-note{font-size:11.5px;color:var(--ink-faint);margin-top:6px;}
  .off-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;}
  .override-btn{
    flex:none;padding:7px 12px;border-radius:9px;border:none;
    background:var(--accent);color:#fff;font-size:12px;font-weight:600;
  }
  .override-btn.off-back{
    width:100%;margin-top:8px;background:#F2F0EA;color:var(--ink-soft);
  }
  .tag-override{background:var(--accent-soft);color:var(--accent);}
  .roster-search-input{text-align:left;}
  .roster-search-wrap .search-input{height:43px;font-size:14.5px;}
  .roster-search-wrap .search-clear{width:24px;height:24px;font-size:12px;}
  .roster-back-btn{width:48px;height:43px;font-size:18px;flex:none;}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--card);border-top:1px solid var(--line);padding:9px 14px calc(9px + env(safe-area-inset-bottom));display:flex;gap:7px;z-index:30;}
  .bb-btn{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--ink);}
  .bb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}

  .empty{padding:26px 16px;text-align:center;color:var(--ink-soft);font-size:13.5px;}
  .section-label{font-size:12px;color:var(--ink-soft);margin:12px 4px 6px;font-weight:600;}

  /* ---- Roster screen ---- */
  .roster-list{padding:8px 12px 0;}
  .roster-row{background:var(--card);padding:11px 12px;border-bottom:1px solid var(--line);}
  .roster-row:last-child{border-bottom:none;}
  .roster-row.retired{opacity:0.5;}
  .roster-top{display:flex;align-items:center;gap:8px;}
  .roster-name{font-size:15px;font-weight:600;flex:1;}
  .roster-edit-btn{font-size:11.5px;color:var(--accent);border:1px solid var(--accent-soft);background:var(--accent-soft);padding:4px 9px;border-radius:7px;}
  .roster-meta{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}

  .add-fab{
    position:fixed;right:16px;bottom:80px;width:48px;height:48px;border-radius:50%;
    background:var(--accent);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.18);z-index:25;border:none;max-width:430px;
  }

  /* ---- Modal ---- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.42);z-index:40;display:none;align-items:flex-end;justify-content:center;}
  .modal-backdrop.show{display:flex;}
  .modal-backdrop-center{align-items:center;padding:20px;}
  .modal-backdrop-center .modal{border-radius:18px;max-height:88vh;}
  .modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:430px;padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:84vh;overflow-y:auto;}
  .modal h3{margin:0 0 12px;font-size:16px;}
  .modal-row{display:flex;justify-content:space-between;padding:7px 0;font-size:13.5px;border-bottom:1px solid var(--line);}
  .modal-close,.modal-save{width:100%;padding:12px;border-radius:11px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;margin-top:6px;}
  .modal-secondary{width:100%;padding:11px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:13.5px;font-weight:600;margin-top:8px;}
  .modal-danger{color:var(--absent);border-color:var(--absent-soft);background:var(--absent-soft);}

  .form-label{font-size:12.5px;color:var(--ink-soft);margin:12px 0 5px;font-weight:600;}
  .form-input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14.5px;background:#fff;color:var(--ink);}
  .day-grid{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
  .day-chip{flex:1;min-width:38px;text-align:center;padding:8px 0;border-radius:9px;border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink-soft);background:#fff;}
  .day-chip.active{background:var(--absent);color:#fff;border-color:var(--absent);}
  .day-hint{font-size:11.5px;color:var(--ink-faint);margin-top:5px;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:10px 12px;background:#FAF9F6;border-radius:10px;}
  .switch{position:relative;width:42px;height:24px;border-radius:999px;background:var(--line-strong);flex:none;}
  .switch.on{background:var(--accent);}
  .switch-dot{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left 0.15s;}
  .switch.on .switch-dot{left:20px;}

  .tab-bar{display:flex;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:20;}
  .tab-btn{flex:1;text-align:center;padding:12px 0 10px;font-size:13.5px;color:var(--ink-soft);font-weight:600;border-bottom:2px solid transparent;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
</style>
</head>
<body>

<!-- ===================== 출석부 화면 ===================== -->
<div class="screen active" id="screenAttendance">
  <div class="topbar">
    <div class="date-row">
      <div class="nav-btn" id="prevDay">‹</div>
      <div class="date-main" id="dateLabel">6월 22일 월요일</div>
      <div style="display:flex;gap:5px;">
        <div class="icon-btn" id="gotoRoster">명부</div>
        <div class="nav-btn" id="nextDay">›</div>
      </div>
    </div>

    <div class="summary-row">
      <div class="sum-card"><div class="sum-num" id="sumTotal">0</div><div class="sum-label">총출석</div></div>
      <div class="sum-card"><div class="sum-num" id="sumLunch">0</div><div class="sum-label">점심식수</div></div>
      <div class="sum-card"><div class="sum-num" id="sumDinner">0</div><div class="sum-label">저녁식수</div></div>
      <div class="search-box-wrap">
        <input class="search-input" id="searchBox" placeholder="이름">
        <button class="search-clear" id="searchClear" style="display:none;">✕</button>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-chip active" data-filter="all">전체</div>
      <div class="filter-chip" data-filter="today-on">오늘 등원일</div>
      <div class="filter-chip" data-filter="issue">지각·조퇴·결석</div>
      <div class="filter-chip" data-filter="evening">저녁식사자</div>
      <div class="filter-chip" data-filter="noted">비고 있음</div>
    </div>
  </div>

  <div class="list" id="listArea"></div>

  <div class="bottom-bar">
    <div class="bb-btn" id="checkBtn">인원 최종 확인</div>
    <div class="bb-btn primary" id="resetDayBtn">오늘 새로 시작</div>
  </div>
</div>

<!-- ===================== 명부 관리 화면 ===================== -->
<div class="screen" id="screenRoster">
  <div class="topbar">
    <div class="date-row">
      <div class="nav-btn" id="backToAttendance">‹</div>
      <div class="date-main">이용자 명부</div>
      <div style="width:32px;"></div>
    </div>
    <div class="tab-bar" style="margin-top:8px;border-radius:10px;overflow:hidden;border:1px solid var(--line);">
      <div class="tab-btn active" data-roster-tab="active">이용중</div>
      <div class="tab-btn" data-roster-tab="retired">퇴소자 기록</div>
    </div>
    <div style="display:flex;gap:6px;margin-top:8px;align-items:stretch;">
      <div class="search-box-wrap roster-search-wrap" style="flex:1;">
        <input class="search-input roster-search-input" id="rosterSearchBox" placeholder="이름 검색" style="width:100%;">
        <button class="search-clear" id="rosterSearchClear" style="display:none;">✕</button>
      </div>
      <button class="nav-btn roster-back-btn" id="rosterBackBtn2">‹</button>
    </div>
  </div>

  <div class="roster-list" id="rosterList"></div>

  <button class="add-fab" id="addPersonFab">＋</button>
</div>

<!-- ===================== 인원확인 모달 ===================== -->
<div class="modal-backdrop" id="checkModal">
  <div class="modal">
    <h3>오늘 인원 확인</h3>
    <div id="checkBody"></div>
    <button class="modal-close" id="checkModalClose">닫기</button>
  </div>
</div>

<!-- ===================== 이용자 등록/수정 모달 ===================== -->
<div class="modal-backdrop modal-backdrop-center" id="editModal">
  <div class="modal">
    <h3 id="editModalTitle">이용자 등록</h3>

    <div class="form-label">이름</div>
    <input class="form-input" id="editName" placeholder="이름 입력">

    <div class="form-label">쉬는 요일 (선택한 요일엔 표에 'X' 표기)</div>
    <div class="day-grid" id="dayGrid"></div>
    <div class="day-hint">센터 운영일: 월~토 · 선택 안 하면 매일 이용</div>

    <div class="toggle-row">
      <span>저녁식사자</span>
      <div class="switch" id="eveningSwitch"><div class="switch-dot"></div></div>
    </div>

    <button class="modal-save" id="saveEditBtn">저장</button>
    <button class="modal-secondary modal-danger" id="retireBtn" style="display:none;">퇴소 처리</button>
    <button class="modal-secondary" id="reactivateBtn" style="display:none;">다시 이용중으로</button>
    <button class="modal-secondary" id="cancelEditBtn">취소</button>
  </div>
</div>

<script>
/* ================= 데이터 ================= */
const STORAGE_ROSTER = "att_roster_v2";
const STORAGE_RECORDS = "att_records_v2";
const WEEKDAYS_FULL = ["일","월","화","수","목","금","토"];
const OPERATING_DAYS = ["월","화","수","목","금","토"]; // 운영일

const DEFAULT_ROSTER = [
{id:1,name:"고경갑",offDays:[],evening:true,retired:false},
{id:2,name:"김경순",offDays:[],evening:true,retired:false},
{id:3,name:"김금순",offDays:[],evening:true,retired:false},
{id:4,name:"김금자",offDays:[],evening:false,retired:false},
{id:5,name:"김수현",offDays:[],evening:true,retired:false},
{id:6,name:"김연례",offDays:[],evening:true,retired:false},
{id:7,name:"김연임",offDays:["토"],evening:false,retired:false},
{id:8,name:"김종식",offDays:[],evening:false,retired:false},
{id:9,name:"김화섭",offDays:[],evening:true,retired:false},
{id:10,name:"김화자",offDays:[],evening:false,retired:false},
{id:11,name:"나금남",offDays:["수"],evening:false,retired:false},
{id:12,name:"남기희",offDays:[],evening:true,retired:false},
{id:13,name:"남영희",offDays:[],evening:false,retired:false},
{id:14,name:"박금숙",offDays:[],evening:false,retired:false},
{id:15,name:"박성숙",offDays:["토"],evening:false,retired:false},
{id:16,name:"방선자",offDays:["토"],evening:false,retired:false},
{id:17,name:"서재순",offDays:[],evening:true,retired:false},
{id:18,name:"성복순",offDays:[],evening:false,retired:false},
{id:19,name:"성수임",offDays:["토"],evening:false,retired:false},
{id:20,name:"손덕이",offDays:[],evening:true,retired:false},
{id:21,name:"손복례",offDays:[],evening:false,retired:false},
{id:22,name:"손정지",offDays:["토"],evening:false,retired:false},
{id:23,name:"송길회",offDays:[],evening:false,retired:false},
{id:24,name:"신동원",offDays:["토"],evening:true,retired:false},
{id:25,name:"안춘자",offDays:[],evening:false,retired:false},
{id:26,name:"여삼순",offDays:["토"],evening:false,retired:false},
{id:27,name:"오복례",offDays:[],evening:true,retired:false},
{id:28,name:"원유자",offDays:[],evening:false,retired:false},
{id:29,name:"유계월",offDays:[],evening:true,retired:false},
{id:30,name:"이도춘",offDays:[],evening:false,retired:false},
{id:31,name:"이무순",offDays:["월","수","금"],evening:false,retired:false},
{id:32,name:"이순덕",offDays:[],evening:true,retired:false},
{id:33,name:"이순수",offDays:["토"],evening:false,retired:false},
{id:34,name:"이선이",offDays:[],evening:false,retired:false},
{id:35,name:"이은분",offDays:[],evening:true,retired:false},
{id:36,name:"이은성",offDays:[],evening:false,retired:false},
{id:37,name:"이정분",offDays:["수"],evening:false,retired:false},
{id:38,name:"이헌식",offDays:[],evening:false,retired:false},
{id:39,name:"이화순",offDays:[],evening:false,retired:false},
{id:40,name:"이희복",offDays:[],evening:false,retired:false},
{id:41,name:"임종순",offDays:[],evening:true,retired:false},
{id:42,name:"정순덕",offDays:["토"],evening:false,retired:false},
{id:43,name:"조경임",offDays:[],evening:false,retired:false},
{id:44,name:"최병식",offDays:["월"],evening:false,retired:false},
{id:45,name:"최청산",offDays:["토"],evening:false,retired:false},
{id:46,name:"하덕순",offDays:[],evening:true,retired:false},
{id:47,name:"한현수",offDays:["토"],evening:false,retired:false},
{id:48,name:"황오심",offDays:[],evening:false,retired:false}
];

let roster = loadRoster();
let records = loadRecords();
let currentDate = new Date();
let activeFilter = "all";
let searchTerm = "";
let editingId = null; // 명부 수정 중인 id (null=신규등록)
let rosterTab = "active";

function loadRoster(){
  try{
    const raw = localStorage.getItem(STORAGE_ROSTER);
    return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_ROSTER));
  }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_ROSTER)); }
}
function saveRoster(){ try{ localStorage.setItem(STORAGE_ROSTER, JSON.stringify(roster)); }catch(e){} }
function loadRecords(){
  try{ const raw = localStorage.getItem(STORAGE_RECORDS); return raw ? JSON.parse(raw) : {}; }
  catch(e){ return {}; }
}
function saveRecords(){ try{ localStorage.setItem(STORAGE_RECORDS, JSON.stringify(records)); }catch(e){} }

function dateKey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dateLabel(d){ return (d.getMonth()+1)+"월 "+d.getDate()+"일 "+WEEKDAYS_FULL[d.getDay()]+"요일"; }
function getDayRecord(){ const key = dateKey(currentDate); if(!records[key]) records[key] = {}; return records[key]; }
function getEntry(personId){
  const day = getDayRecord();
  if(!day[personId]) day[personId] = {status:null, lunch:null, dinner:null, note:"", overrideOn:false, lunchManual:false, dinnerManual:false};
  return day[personId];
}
function isOffToday(person){
  const wd = WEEKDAYS_FULL[currentDate.getDay()];
  return person.offDays.includes(wd);
}
function isActuallyOff(person){
  const scheduledOff = isOffToday(person);
  if(!scheduledOff) return false;
  const entry = getEntry(person.id);
  return !entry.overrideOn;
}
function activeRoster(){ return roster.filter(p=>!p.retired); }
function sortedRoster(list){ return [...list].sort((a,b)=>a.name.localeCompare(b.name,'ko')); }

/* 상태에 따른 점심/저녁 기본값 계산 */
function defaultMeals(status, eveningUser){
  if(status==="absent") return {lunch:false, dinner:false};
  if(status==="early") return {lunch:true, dinner:false};
  if(status==="late") return {lunch:true, dinner:eveningUser};
  return {lunch:true, dinner:eveningUser}; // present
}

/* ================= 출석부 렌더 ================= */
function render(){
  document.getElementById("dateLabel").textContent = dateLabel(currentDate);
  const listArea = document.getElementById("listArea");
  listArea.innerHTML = "";

  const all = activeRoster();
  const filtered = sortedRoster(all).filter(p=>{
    if(searchTerm && !p.name.includes(searchTerm)) return false;
    const off = isActuallyOff(p);
    const entry = getEntry(p.id);
    if(activeFilter==="today-on" && off) return false;
    if(activeFilter==="evening" && !p.evening) return false;
    if(activeFilter==="issue" && (off || !entry.status || entry.status==="present")) return false;
    if(activeFilter==="noted" && !(entry.note && entry.note.trim())) return false;
    return true;
  });

  if(filtered.length===0){
    listArea.innerHTML = '<div class="empty">해당 조건의 어르신이 없어요.</div>';
    return;
  }

  const card = document.createElement("div");
  card.className = "list-card";

  filtered.forEach(p=>{
    const scheduledOff = isOffToday(p);
    const entry = getEntry(p.id);
    const off = scheduledOff && !entry.overrideOn;

    const row = document.createElement("div");
    row.className = "row" + (off ? " is-off" : "");

    let tagsHtml = "";
    if(scheduledOff){
      const offText = p.offDays.join("") + "X";
      tagsHtml += `<span class="tag tag-off">${offText}</span>`;
      if(entry.overrideOn) tagsHtml += `<span class="tag tag-override">통보출석</span>`;
    }

    let bodyHtml = "";
    if(!off){
      const hasStatus = !!entry.status;
      bodyHtml = `
        <div class="status-btns">
          <button class="status-btn ${entry.status==='present'?'sel-present':''}" data-id="${p.id}" data-status="present">등원</button>
          <button class="status-btn ${entry.status==='late'?'sel-late':''}" data-id="${p.id}" data-status="late">지각</button>
          <button class="status-btn ${entry.status==='early'?'sel-early':''}" data-id="${p.id}" data-status="early">조퇴</button>
          <button class="status-btn ${entry.status==='absent'?'sel-absent':''}" data-id="${p.id}" data-status="absent">결석</button>
        </div>
        ${hasStatus ? `
        <div class="meal-row">
          <div class="meal-toggle">
            <span>점심</span>
            <button class="meal-pill ${entry.lunch?'on':'off'}" data-id="${p.id}" data-meal="lunch">${entry.lunch?'점O':'점X'}</button>
          </div>
          <div class="meal-toggle">
            <span>저녁</span>
            <button class="meal-pill ${entry.dinner?'on':'off'}" data-id="${p.id}" data-meal="dinner">${entry.dinner?'석O':'석X'}</button>
          </div>
          <input type="text" class="note-input" placeholder="비고" data-id="${p.id}" value="${entry.note||''}">
        </div>
        ` : `<div class="unchecked-note">출결 미체크</div>`}
        ${scheduledOff ? `<button class="override-btn off-back" data-id="${p.id}">휴원으로 되돌리기</button>` : ''}
      `;
    } else {
      bodyHtml = `
        <div class="off-row">
          <span class="off-note">휴원 · 인원수에 포함 안 됨</span>
          <button class="override-btn" data-id="${p.id}">출석으로 전환</button>
        </div>
      `;
    }

    row.innerHTML = `
      <div class="row-inner">
        <div class="row-top">
          <span class="row-no">${p.id}</span>
          <span class="row-name">${p.name}</span>
          ${tagsHtml}
        </div>
        ${bodyHtml}
      </div>
    `;
    card.appendChild(row);
  });

  listArea.appendChild(card);

  // 인원 집계 (필터 무관, 전체 이용중 명단 기준)
  let total=0, lunch=0, dinner=0;
  all.forEach(p=>{
    const off = isActuallyOff(p);
    if(off) return;
    const entry = getEntry(p.id);
    if(!entry.status || entry.status==="absent") return;
    total++;
    if(entry.lunch) lunch++;
    if(entry.dinner) dinner++;
  });
  document.getElementById("sumTotal").textContent = total;
  document.getElementById("sumLunch").textContent = lunch;
  document.getElementById("sumDinner").textContent = dinner;

  bindRowEvents();
}

function bindRowEvents(){
  document.querySelectorAll(".status-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = Number(btn.dataset.id);
      const status = btn.dataset.status;
      const entry = getEntry(id);
      const person = roster.find(r=>r.id===id);
      entry.status = status;
      const meals = defaultMeals(status, person.evening);
      entry.lunch = meals.lunch;
      entry.dinner = meals.dinner;
      entry.lunchManual = false;
      entry.dinnerManual = false;
      saveRecords();
      render();
    });
  });
  document.querySelectorAll(".meal-pill").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      const id = Number(btn.dataset.id);
      const meal = btn.dataset.meal;
      const entry = getEntry(id);
      entry[meal] = !entry[meal];
      if(meal==="dinner") entry.dinnerManual = true;
      if(meal==="lunch") entry.lunchManual = true;
      saveRecords();
      render();
    });
  });
  document.querySelectorAll(".note-input").forEach(inp=>{
    inp.addEventListener("input", ()=>{
      const id = Number(inp.dataset.id);
      const entry = getEntry(id);
      entry.note = inp.value;
      saveRecords();
    });
  });
  document.querySelectorAll(".override-btn.off-back").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = Number(btn.dataset.id);
      const entry = getEntry(id);
      entry.overrideOn = false;
      saveRecords();
      render();
    });
  });
  document.querySelectorAll(".override-btn:not(.off-back)").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = Number(btn.dataset.id);
      const entry = getEntry(id);
      const person = roster.find(r=>r.id===id);
      entry.overrideOn = true;
      entry.status = "present";
      const meals = defaultMeals("present", person.evening);
      entry.lunch = meals.lunch;
      entry.dinner = meals.dinner;
      entry.lunchManual = false;
      entry.dinnerManual = false;
      saveRecords();
      render();
    });
  });
}

/* ================= 이벤트: 날짜/검색/필터 ================= */
document.getElementById("prevDay").addEventListener("click", ()=>{ currentDate.setDate(currentDate.getDate()-1); render(); });
document.getElementById("nextDay").addEventListener("click", ()=>{ currentDate.setDate(currentDate.getDate()+1); render(); });
document.getElementById("searchBox").addEventListener("input", (e)=>{
  searchTerm = e.target.value.trim();
  document.getElementById("searchClear").style.display = e.target.value ? "flex" : "none";
  render();
});
document.getElementById("searchClear").addEventListener("click", ()=>{
  const box = document.getElementById("searchBox");
  box.value = "";
  searchTerm = "";
  document.getElementById("searchClear").style.display = "none";
  render();
});
document.getElementById("rosterSearchBox").addEventListener("input", (e)=>{
  rosterSearchTerm = e.target.value.trim();
  document.getElementById("rosterSearchClear").style.display = e.target.value ? "flex" : "none";
  renderRoster();
});
document.getElementById("rosterSearchClear").addEventListener("click", ()=>{
  const box = document.getElementById("rosterSearchBox");
  box.value = "";
  rosterSearchTerm = "";
  document.getElementById("rosterSearchClear").style.display = "none";
  renderRoster();
});
document.querySelectorAll(".filter-row .filter-chip").forEach(chip=>{
  chip.addEventListener("click", ()=>{
    document.querySelectorAll(".filter-row .filter-chip").forEach(c=>c.classList.remove("active"));
    chip.classList.add("active");
    activeFilter = chip.dataset.filter;
    render();
  });
});
document.getElementById("resetDayBtn").addEventListener("click", ()=>{
  if(confirm("오늘 기록을 전부 지우고 새로 시작할까요?")){
    delete records[dateKey(currentDate)];
    saveRecords();
    render();
  }
});
document.getElementById("checkBtn").addEventListener("click", showCheckModal);
document.getElementById("checkModalClose").addEventListener("click", ()=>{
  document.getElementById("checkModal").classList.remove("show");
});

function showCheckModal(){
  const body = document.getElementById("checkBody");
  let html = "";
  let total=0, lunch=0, dinner=0, issues=[], unchecked=[];
  sortedRoster(activeRoster()).forEach(p=>{
    const off = isActuallyOff(p);
    if(off) return;
    const entry = getEntry(p.id);
    if(isOffToday(p) && entry.overrideOn){
      issues.push(`${p.name} — 휴무일 통보출석${entry.note? " · "+entry.note:""}`);
    }
    if(!entry.status){
      unchecked.push(p.name);
      return;
    }
    if(entry.status==="absent"){
      issues.push(`${p.name} — 결석${entry.note? " · "+entry.note:""}`);
      return;
    }
    total++;
    if(entry.lunch) lunch++;
    if(entry.dinner) dinner++;
    if(entry.status==="late") issues.push(`${p.name} — 지각${entry.note? " · "+entry.note:""}${!entry.lunch?" · 점X":""}`);
    if(entry.status==="early") issues.push(`${p.name} — 조퇴${entry.note? " · "+entry.note:""}`);
    if(entry.status==="present" && (!entry.lunch || entry.dinner!==p.evening)){
      issues.push(`${p.name} — 식수 수동조정${!entry.lunch?" · 점X":""}${entry.dinner!==p.evening?(entry.dinner?" · 석O":" · 석X"):""}`);
    }
  });
  html += `<div class="modal-row"><span>총출석인원</span><span><strong>${total}</strong>명</span></div>`;
  html += `<div class="modal-row"><span>점심식수</span><span><strong>${lunch}</strong>명</span></div>`;
  html += `<div class="modal-row"><span>저녁식수</span><span><strong>${dinner}</strong>명</span></div>`;
  if(unchecked.length>0){
    html += `<div class="section-label">아직 체크 안 한 분 (${unchecked.length}명)</div>`;
    html += `<div class="modal-row"><span style="font-size:13px;">${unchecked.join(", ")}</span></div>`;
  }
  if(issues.length>0){
    html += `<div class="section-label">특이사항</div>`;
    issues.forEach(t=>{ html += `<div class="modal-row"><span style="font-size:13px;">${t}</span></div>`; });
  }
  body.innerHTML = html;
  document.getElementById("checkModal").classList.add("show");
}

/* ================= 화면 전환 ================= */
document.getElementById("gotoRoster").addEventListener("click", ()=>{
  document.getElementById("screenAttendance").classList.remove("active");
  document.getElementById("screenRoster").classList.add("active");
  renderRoster();
});
function goBackToAttendance(){
  document.getElementById("screenRoster").classList.remove("active");
  document.getElementById("screenAttendance").classList.add("active");
  render();
}
document.getElementById("backToAttendance").addEventListener("click", goBackToAttendance);
document.getElementById("rosterBackBtn2").addEventListener("click", goBackToAttendance);
document.querySelectorAll(".tab-bar .tab-btn").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab-bar .tab-btn").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    rosterTab = tab.dataset.rosterTab;
    renderRoster();
  });
});

/* ================= 명부 화면 ================= */
let rosterSearchTerm = "";
function renderRoster(){
  const list = document.getElementById("rosterList");
  list.innerHTML = "";
  let data = rosterTab==="active" ? sortedRoster(roster.filter(p=>!p.retired)) : sortedRoster(roster.filter(p=>p.retired));
  if(rosterSearchTerm){
    data = data.filter(p=>p.name.includes(rosterSearchTerm));
  }

  if(data.length===0){
    list.innerHTML = `<div class="empty">${rosterSearchTerm ? '검색 결과가 없어요.' : (rosterTab==='active' ? '등록된 이용자가 없어요.' : '퇴소 기록이 없어요.')}</div>`;
    return;
  }

  const card = document.createElement("div");
  card.className = "list-card";

  data.forEach(p=>{
    const row = document.createElement("div");
    row.className = "roster-row" + (p.retired ? " retired" : "");
    const offText = p.offDays.length ? p.offDays.map(d=>d+"X").join(" · ") : "매일 이용";
    const eveText = p.evening ? "저녁식사자" : "저녁식사 안함";
    row.innerHTML = `
      <div class="roster-top">
        <span class="roster-name">${p.name}</span>
        <button class="roster-edit-btn" data-id="${p.id}">${p.retired?'기록보기':'수정'}</button>
      </div>
      <div class="roster-meta">${offText} · ${eveText}${p.retired && p.retiredDate ? ' · 퇴소일 '+p.retiredDate : ''}</div>
    `;
    card.appendChild(row);
  });

  list.appendChild(card);

  document.querySelectorAll(".roster-edit-btn").forEach(btn=>{
    btn.addEventListener("click", ()=> openEditModal(Number(btn.dataset.id)));
  });
}

document.getElementById("addPersonFab").addEventListener("click", ()=> openEditModal(null));

function openEditModal(id){
  editingId = id;
  const titleEl = document.getElementById("editModalTitle");
  const nameInput = document.getElementById("editName");
  const grid = document.getElementById("dayGrid");
  grid.innerHTML = "";
  OPERATING_DAYS.forEach(d=>{
    const chip = document.createElement("div");
    chip.className = "day-chip";
    chip.textContent = d;
    chip.dataset.day = d;
    grid.appendChild(chip);
  });

  let person = null;
  if(id!==null){ person = roster.find(r=>r.id===id); }

  if(person){
    titleEl.textContent = person.retired ? "퇴소자 기록" : "이용자 수정";
    nameInput.value = person.name;
    person.offDays.forEach(d=>{
      const chip = grid.querySelector(`[data-day="${d}"]`);
      if(chip) chip.classList.add("active");
    });
    setSwitch(person.evening);
    document.getElementById("retireBtn").style.display = person.retired ? "none" : "block";
    document.getElementById("reactivateBtn").style.display = person.retired ? "block" : "none";
    nameInput.disabled = person.retired;
    grid.querySelectorAll(".day-chip").forEach(c=>{ if(person.retired) c.style.pointerEvents="none"; else c.style.pointerEvents="auto"; });
    document.getElementById("eveningSwitch").style.pointerEvents = person.retired ? "none" : "auto";
    document.getElementById("saveEditBtn").style.display = person.retired ? "none" : "block";
  } else {
    titleEl.textContent = "이용자 등록";
    nameInput.value = "";
    nameInput.disabled = false;
    setSwitch(false);
    document.getElementById("retireBtn").style.display = "none";
    document.getElementById("reactivateBtn").style.display = "none";
    document.getElementById("saveEditBtn").style.display = "block";
    grid.querySelectorAll(".day-chip").forEach(c=> c.style.pointerEvents="auto");
    document.getElementById("eveningSwitch").style.pointerEvents = "auto";
  }

  grid.querySelectorAll(".day-chip").forEach(chip=>{
    chip.addEventListener("click", ()=> chip.classList.toggle("active"));
  });

  document.getElementById("editModal").classList.add("show");
}

function setSwitch(on){
  const sw = document.getElementById("eveningSwitch");
  sw.classList.toggle("on", !!on);
  sw.dataset.on = on ? "1" : "0";
}
document.getElementById("eveningSwitch").addEventListener("click", ()=>{
  const sw = document.getElementById("eveningSwitch");
  const newVal = sw.dataset.on === "1" ? false : true;
  setSwitch(newVal);
});

document.getElementById("cancelEditBtn").addEventListener("click", ()=>{
  document.getElementById("editModal").classList.remove("show");
});

document.getElementById("saveEditBtn").addEventListener("click", ()=>{
  const name = document.getElementById("editName").value.trim();
  if(!name){ alert("이름을 입력해주세요."); return; }
  const offDays = Array.from(document.querySelectorAll("#dayGrid .day-chip.active")).map(c=>c.dataset.day);
  const evening = document.getElementById("eveningSwitch").dataset.on === "1";

  if(editingId===null){
    const newId = roster.length ? Math.max(...roster.map(r=>r.id))+1 : 1;
    roster.push({id:newId, name, offDays, evening, retired:false});
  } else {
    const person = roster.find(r=>r.id===editingId);
    const eveningChanged = person.evening !== evening;
    person.name = name;
    person.offDays = offDays;
    person.evening = evening;

    let recordsChanged = false;
    if(eveningChanged){
      const todayKey = dateKey(currentDate);
      const todayRecord = records[todayKey];
      if(todayRecord && todayRecord[person.id]){
        const entry = todayRecord[person.id];
        if(entry.status && entry.status!=="absent" && entry.status!=="early" && !entry.dinnerManual){
          entry.dinner = evening;
          recordsChanged = true;
        }
      }
    }
    if(recordsChanged) saveRecords();
  }
  saveRoster();
  document.getElementById("editModal").classList.remove("show");
  renderRoster();
});

document.getElementById("retireBtn").addEventListener("click", ()=>{
  if(editingId===null) return;
  if(!confirm("퇴소 처리할까요? 출석부에는 더 이상 나오지 않지만 기록은 남아요.")) return;
  const person = roster.find(r=>r.id===editingId);
  person.retired = true;
  person.retiredDate = dateKey(new Date());
  saveRoster();
  document.getElementById("editModal").classList.remove("show");
  renderRoster();
});

document.getElementById("reactivateBtn").addEventListener("click", ()=>{
  if(editingId===null) return;
  const person = roster.find(r=>r.id===editingId);
  person.retired = false;
  delete person.retiredDate;
  saveRoster();
  document.getElementById("editModal").classList.remove("show");
  renderRoster();
});

render();
</script>
